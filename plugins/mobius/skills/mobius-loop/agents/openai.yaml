interface:
  display_name: "Mobius Loop"
  short_description: "Run one explicit Objective through Mobius Core"
  default_prompt: "Use $mobius-loop to continue the explicitly selected Objective from current Core state."
dependencies:
  tools:
    - type: "mcp"
      value: "mobius"
      description: "Project-local Mobius Core MCP server"
      transport: "stdio"
policy:
  allow_implicit_invocation: false
