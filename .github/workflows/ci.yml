name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
    tags:
      - v*
  workflow_dispatch:

jobs:
  release-gate-x86_64-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/.tmp/cargo-target
      RELEASE_TARGET: x86_64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pinned Rust
        uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt, clippy
          targets: x86_64-unknown-linux-gnu

      - name: Verify pinned Rust
        run: |
          test "$(rustc --version --verbose | sed -n 's/^release: //p')" = 1.85.0

      - name: Format
        run: cargo fmt --manifest-path plugins/mobius/runtime/Cargo.toml --all --check

      - name: Check locked source
        run: cargo check --manifest-path plugins/mobius/runtime/Cargo.toml --locked --all-targets

      - name: Lint
        run: cargo clippy --manifest-path plugins/mobius/runtime/Cargo.toml --locked --all-targets -- -D warnings

      - name: Test
        run: cargo test --manifest-path plugins/mobius/runtime/Cargo.toml --locked --all-targets

      - name: Validate unavailable source package
        run: bash tests/release_bundle_contract.sh source "$GITHUB_WORKSPACE"

      - name: Git hygiene
        run: |
          git diff --check
          status="$(git status --short --ignored=no)"
          if [ -n "$status" ]; then
            printf '%s\n' "$status"
            exit 1
          fi
          git check-ignore -q .mobius/probe
          git check-ignore -q .tmp/probe
          git check-ignore -q plugins/mobius/runtime/target/probe

      - name: Build target release binary
        run: bash .github/scripts/build-release-binary.sh "$RELEASE_TARGET"

      - name: Assemble target plugin bundle
        id: bundle
        run: |
          version="$(jq -r '.version' plugins/mobius/.codex-plugin/plugin.json)"
          bundle_root="$RUNNER_TEMP/mobius-$version-$RELEASE_TARGET"
          bash .github/scripts/assemble-release-bundle.sh \
            "$RELEASE_TARGET" \
            "$CARGO_TARGET_DIR/$RELEASE_TARGET/release/mobius" \
            "$bundle_root"
          printf 'root=%s\n' "$bundle_root" >> "$GITHUB_OUTPUT"
          printf 'name=%s\n' "mobius-$version-$RELEASE_TARGET" >> "$GITHUB_OUTPUT"

      - name: Validate assembled bundle and clean-cache startup
        run: bash tests/release_bundle_contract.sh bundle "${{ steps.bundle.outputs.root }}"

      - name: Archive assembled bundle
        id: archive
        run: |
          archive="$RUNNER_TEMP/${{ steps.bundle.outputs.name }}.tar.gz"
          tar -C "$(dirname "${{ steps.bundle.outputs.root }}")" \
            -czf "$archive" \
            "$(basename "${{ steps.bundle.outputs.root }}")"
          (
            cd "$(dirname "$archive")"
            sha256sum "$(basename "$archive")" > "$(basename "$archive").sha256"
          )
          printf 'path=%s\n' "$archive" >> "$GITHUB_OUTPUT"

      - name: Validate portable archive checksum
        run: bash tests/release_bundle_contract.sh archive "${{ steps.archive.outputs.path }}"

      - name: Revalidate extracted release artifact
        run: |
          extract_root="$RUNNER_TEMP/extracted"
          mkdir "$extract_root"
          tar -C "$extract_root" -xzf "${{ steps.archive.outputs.path }}"
          bash tests/release_bundle_contract.sh bundle-shape \
            "$extract_root/${{ steps.bundle.outputs.name }}"

      - name: Upload target artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.bundle.outputs.name }}
          path: |
            ${{ steps.archive.outputs.path }}
            ${{ steps.archive.outputs.path }}.sha256
          if-no-files-found: error
