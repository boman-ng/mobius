name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
    tags:
      - v*
  workflow_dispatch:

jobs:
  test-and-release-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Python syntax check
        env:
          PYTHONPYCACHEPREFIX: ${{ runner.temp }}/pycache
        run: |
          python -m py_compile \
            plugins/mobius/scripts/mobius.py \
            plugins/mobius/scripts/mobius_review_mcp.py \
            tests/mobius_regression_tests.py \
            tests/test_release_bundle.py

      - name: Pytest
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -m pytest

      - name: Hook health
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python plugins/mobius/scripts/mobius.py --project-root "$GITHUB_WORKSPACE" hook-health

      - name: Git hygiene
        run: |
          git diff --check
          status="$(git status --short --ignored=no)"
          if [ -n "$status" ]; then
            printf '%s\n' "$status"
            exit 1
          fi
          git check-ignore -q .mobius/probe
